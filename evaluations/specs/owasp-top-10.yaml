anchor: owasp-top-10
tier: 3
questions:
  recognition:
    question: 'Which of the following best describes "OWASP Top 10"?

      '
    options:
      A: A regularly updated list of the ten most critical web application security
        risks, covering threats like injection, broken access control, and
        cryptographic failures
      B: A comprehensive framework for assessing software reliability and safety
        integrity levels in critical systems with four distinct SIL classifications
      C: An industry standard methodology for evaluating cybersecurity maturity
        across organizational processes with five progressive capability levels
      D: A systematic approach to privacy threat modeling that identifies linkability,
        identifiability, and disclosure risks in software systems
    correct: A
